<section class="viewer-section" style="height: 100%; display: flex; flex-direction: column;">
    
    <div id="canvas-container" style="position: relative; flex: 1; overflow: hidden; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px;">

        <div id="zoomLevelDisplay" style="position: absolute; top: 15px; left: 15px; z-index: 1000; display: none;"></div>

        <div id="placeholder-ui" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: var(--text-secondary);"></div>

        <div id="loading-indicator" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000;">
            <p style="background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 20px;">⏳ 변환 중...</p>
        </div>

        <canvas id="main-canvas"></canvas>

        <div class="viewer-bottom-toolbar">
            
            <button id="btnViewOriginal" class="v-btn" title="원본 비교 (누르고 있으면 원본)">👁️</button>
            <button id="btnEyedropper" class="v-btn" title="스포이드 (색상 추출)">💉</button>
            <button id="btnRecenter" class="v-btn" title="화면 중앙 정렬">⌖</button>
            <button id="btnResetAll" class="v-btn" title="모든 설정 초기화">🔄</button>
            
            <div class="v-divider"></div>
            
            <div id="downloadCheckboxes" class="dl-checkbox-group">
                
                <label class="dl-label">
                    <input type="checkbox" id="chkDlSeparated"> 분리(.zip)
                </label>

                <div class="dl-popup-wrapper">
                    <label class="dl-label">
                        <input type="checkbox" id="chkDlSplit"> 분할(.zip)
                    </label>
                    <div id="popupDlSplit" class="dl-popup dl-popup-split">
                        <div class="dl-popup-title">분할 수 (가로 x 세로)</div>
                        <div class="dl-popup-inputs">
                            <input type="number" id="splitCols" value="2" min="1" class="dl-input-number">
                            <span>x</span>
                            <input type="number" id="splitRows" value="2" min="1" class="dl-input-number">
                        </div>
                        <label class="dl-label-small">
                            <input type="checkbox" id="chkMaintainSize" checked> 원본 사이즈 유지 (투명화)
                        </label>
                        <div class="dl-popup-tail tail-left"></div>
                    </div>
                </div>
                
                <div id="wrapDlWplace" class="dl-popup-wrapper" style="display: none;">
                    <label class="dl-label color-wplace">
                        <input type="checkbox" id="chkDlWplace"> .wplace
                    </label>
                    <div id="popupDlWplace" class="dl-popup dl-popup-wplace">
                        <div class="dl-grid-2">
                            <label class="dl-grid-label">TX 좌표
                                <input type="number" id="wplaceTileX" placeholder="0" class="dl-input-number">
                            </label>
                            <label class="dl-grid-label">TY 좌표
                                <input type="number" id="wplaceTileY" placeholder="0" class="dl-input-number">
                            </label>
                            <label class="dl-grid-label">PX 좌표
                                <input type="number" id="wplacePixelX" placeholder="0" class="dl-input-number">
                            </label>
                            <label class="dl-grid-label">PY 좌표
                                <input type="number" id="wplacePixelY" placeholder="0" class="dl-input-number">
                            </label>
                        </div>
                        <div class="dl-popup-tail tail-right"></div>
                    </div>
                </div>

                <label id="wrapDlUplace" class="dl-label color-uplace" style="display: none;">
                    <input type="checkbox" id="chkDlUplace"> .you
                </label>
            </div>

            <button id="btnDownload" class="dl-btn" title="현재 이미지 저장">💾 다운로드</button>
        </div>

    </div>
</section>
