<style>

    .secret-pixel-zone {

        z-index: 9999;
        display: flex;
        align-items: flex-start; /* 위에서 아래로 내려오도록 설정 */
    }

    /* 2. 평소엔 위로 쏙 숨어있는 패트리온 버튼 */
    .secret-patreon-btn {

        margin-left: 15px;
        padding: 12px 18px;
        background: linear-gradient(145deg, #FF424D, #ff6b73);
        color: white !important;
        text-decoration: none;
        font-weight: bold;
        font-size: 13px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(255, 66, 77, 0.4);
        line-height: 1.5;
        white-space: nowrap;
        
        /* 헤더 위쪽으로 숨겨둠 (-20px) */
        opacity: 0;
        transform: translateY(-20px) scale(0.9); 
        pointer-events: none;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* 3. 마우스가 좌측 상단 끝에 닿으면 밑으로 뿅! */
    .secret-pixel-zone:hover .secret-patreon-btn {
