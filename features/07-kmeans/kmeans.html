<section class="sidebar-section" id="kmeans-section-group">
    <h2>3. 스마트 색상 추출 (K-Means)</h2>
    
    <div class="kmeans-panel">
        
        <div id="kmeans-track-1" class="kmeans-track">
            <div class="control-group kmeans-control">
                <label class="kmeans-label">
                    <span>🎯 팔레트 색상 매칭 (안 쓰는 색 끄기)</span>
                    <span id="matchSliderVal" class="kmeans-val-match">16색</span>
                </label>
                <input type="range" id="matchSlider" class="kmeans-slider" min="2" max="127" value="16" step="1">
                <small class="kmeans-desc">
                    추출된 색상과 원본 팔레트를 대조하여 사용량이 0인 색상의 체크(✓)를 해제합니다.
                </small>
            </div>
            <button id="btnKmeansMatch" class="action-btn kmeans-btn kmeans-btn-match">
                🎯 이미지와 매칭하여 팔레트 최적화
            </button>
        </div>

        <div id="kmeans-track-2" class="kmeans-track track-divider">
            <div class="control-group kmeans-control">
                <label class="kmeans-label">
                    <span class="kmeans-val-extract">✨ 커스텀 색상 자동 추출</span>
                    <span id="addSliderVal" class="kmeans-val-extract">16색</span>
                </label>
                <input type="range" id="addSlider" class="kmeans-slider" min="1" max="256" value="16" step="1">
                <small class="kmeans-desc">
                    이미지에서 색을 뽑아 커스텀 팔레트에 자동으로 추가합니다.
                </small>
            </div>
            <button id="btnKmeansExtract" class="action-btn kmeans-btn kmeans-btn-extract">
                ✨ 추출한 색상을 커스텀에 추가
            </button>
        </div>

    </div>
</section>
