<section class="sidebar-section">
    <h2>4. 팔레트 관리</h2>
    
    <div class="palette-mode-selector">
        <button class="active" data-mode="geopixels">GeoPixels</button>
        <button data-mode="wplace">Wplace</button>
        <button data-mode="uplace">Uplace</button>
    </div>

    
    
    <div id="palette-container"></div>

    <div id="custom-section" style="border-top: 1px dashed var(--border-color); padding-top: 15px; margin-top: 15px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <label style="font-weight: bold;">🎨 커스텀 팔레트</label>
            <div class="view-mode-toggle" style="display: flex; gap: 5px;">
                <button id="viewListBtn" class="mini-btn active">☰</button>
                <button id="viewGridBtn" class="mini-btn">▦</button>
            </div>
        </div>

        <div class="input-group-row" style="display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; margin-top: 10px;">
            <input type="text" id="addHex" placeholder="HEX 코드 입력 (예: #FFFFFF)" style="text-transform: uppercase;">
            <div style="display: flex; gap: 2px; flex: 2;">
                <input type="number" id="addR" placeholder="R" min="0" max="255" style="flex: 1;">
                <input type="number" id="addG" placeholder="G" min="0" max="255" style="flex: 1;">
                <input type="number" id="addB" placeholder="B" min="0" max="255" style="flex: 1;">
                <button id="addColorBtn" class="action-btn" style="padding: 0 10px;">+</button>
            </div>
        </div>

        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <button id="toggleAllCustomBtn" class="mini-btn" title="커스텀 전체 선택/해제" style="font-weight: bold; width: 28px;">A</button>
            <select id="paletteSortSelect" style="flex: 1; font-size: 0.85em;">
                <option value="added">추가순</option>
                <option value="count">사용량순</option>
                <option value="bright">밝기순</option>
                <option value="r">R값 높은순</option>
                <option value="g">G값 높은순</option>
                <option value="b">B값 높은순</option>
            </select>
            <button id="exportPaletteBtn" class="mini-btn" title="팔레트 내보내기">💾</button>
            <button id="importPaletteBtn" class="mini-btn" title="팔레트 불러오기">📂</button>
            <button id="resetAddedColorsBtn" class="mini-btn" title="전체 초기화">🔄</button>
            <input type="file" id="paletteUpload" style="display: none;" accept=".json">
        </div>

        <div id="custom-palette-container"></div>
    </div>
</section>
