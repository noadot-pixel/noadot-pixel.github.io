<div class="comments-launcher">
    <button id="btnOpenComments" class="primary-btn outline-btn" data-i18n="btn_open_comments">
        💬 피드백 및 댓글 보기
    </button>
</div>

<div id="commentsDrawer" class="comments-drawer">
    
    <div class="comments-drawer-header">
        <h2 data-i18n="sec_comments">💬 피드백 및 댓글</h2>
        <button id="btnCloseComments" class="mini-btn close-drawer-btn" title="닫기">✕</button>
    </div>

    <div class="comments-drawer-body">
        
        <div class="comment-input-area">
            <label class="comment-label" data-i18n="label_new_comment">새 댓글 등록</label>
            <input type="text" id="commentNickname" class="ui-input comment-nick" placeholder="닉네임">
            <textarea id="commentContent" class="ui-input comment-text" rows="3" placeholder="댓글 내용을 입력해주세요."></textarea>
            <button id="btnSubmitComment" class="primary-btn comment-submit-btn" data-i18n="btn_submit_comment">댓글 등록</button>
        </div>

        <div class="comment-list-area">
            <label class="comment-label" data-i18n="label_all_comments">전체 댓글</label>
            <div id="commentsContainer" class="comments-container">
                <p class="comment-status-msg" data-i18n="msg_comment_loading">로딩 중...</p>
            </div>
        </div>

    </div>
</div>
