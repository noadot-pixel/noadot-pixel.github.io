<section class="sidebar-section">
    <h2 data-i18n="sec_engine">5. 변환 옵션</h2>

    <details class="category-details" open>
        <summary><span data-i18n="category_color_tone">🎨 색상 및 톤</span></summary>
        <div class="details-content">
            
            <div class="control-group">
                <label class="engine-label-bold" data-i18n="label_color_engine">색상 계산 엔진</label>
                <div class="radio-group" style="margin-bottom: 10px;">
                    <label><input type="radio" name="algoTrack" value="simple" checked> <span data-i18n="algo_simple">기본 (단일)</span></label>
                    <label><input type="radio" name="algoTrack" value="advanced"> <span data-i18n="algo_advanced">전문가 (퓨전)</span></label>
                </div>

                <div id="simpleAlgoPanel">
                    <select id="simpleAlgoSelect" class="ui-select">
                        <option value="rgb" data-i18n="opt_rgb">RGB (날카로운 매칭)</option>
                        <option value="oklab" selected data-i18n="opt_oklab">Oklab (자연스러운 색상)</option>
                        <option value="ciede2000" data-i18n="opt_ciede2000">Wdot (CIEDE2000 D50)</option>
                        <option value="ciede2000-d65" data-i18n="opt_d65">D65 (웹 표준)</option>
                    </select>
                </div>

                <div id="advancedAlgoPanel" class="engine-advanced-panel" style="display: none;">
                    <div class="control-group engine-sub-group">
                        <label class="engine-label-sm" data-i18n="label_model_a">모델 A (기본 베이스)</label>
                        <select id="advancedModelA" class="ui-select">
                            <option value="rgb" data-i18n="opt_rgb">RGB (날카로운 매칭)</option>
                            <option value="oklab" selected data-i18n="opt_oklab">Oklab (자연스러운 색상)</option>
                            <option value="ciede2000" data-i18n="opt_ciede2000">Wdot (CIEDE2000 D50)</option>
                            <option value="ciede2000-d65" data-i18n="opt_d65">D65 (웹 표준)</option>
                        </select>
                    </div>

                    <div class="control-group engine-sub-group">
                        <label class="engine-label-sm" data-i18n="label_model_b">모델 B (혼합할 특성)</label>
                        <select id="advancedModelB" class="ui-select">
                            <option value="none" data-i18n="opt_none">사용 안 함 (None)</option>
                            <option value="rgb" data-i18n="opt_rgb">RGB (날카로운 매칭)</option>
                            <option value="oklab" data-i18n="opt_oklab">Oklab (자연스러운 색상)</option>
                            <option value="ciede2000" data-i18n="opt_ciede2000">Wdot (CIEDE2000 D50)</option>
                            <option value="ciede2000-d65" selected data-i18n="opt_d65">D65 (웹 표준)</option>
                        </select>
                    </div>

                    <div class="control-group engine-sub-group">
                        <label class="engine-label-highlight" data-i18n="label_weight_m">퓨전 비중 (Weight M)</label>
                        <input type="range" id="advancedWeightMSlider" min="0" max="1" step="0.05" value="0.8" class="engine-slider-full">
                        <div class="engine-row-between engine-val-highlight" style="font-size: 0.8em;">
                            <span id="advancedWeightMVal_A">Oklab 0.20</span>
                            <span id="advancedWeightMVal_B">D65 0.80</span>
                        </div>
                    </div>

                    <div class="control-group engine-sub-group">
                        <label class="engine-label-sm engine-row-between">
                            <span data-i18n="label_anti_dullness">탁색 방지 (Anti-Dullness)</span>
                            <span id="algoChroma_val" class="engine-val-highlight">10</span>
                        </label>
                        <input type="range" id="algoChromaBoost" min="0" max="100" value="10" class="engine-slider-full">
                        <small class="engine-desc-sm" data-i18n="desc_anti_dullness">값이 높을수록 회색조 매칭을 피하고 팔레트의 선명한 색상을 우선적으로 선택합니다.</small>
                    </div>
                </div>
            </div>

            <hr class="engine-divider">

            <div class="engine-row-between">
                <label><span data-i18n="label_saturation">채도</span>
                    <button class="mini-btn reset-slider-btn" data-target="saturationSlider" data-value-id="saturationValue" data-default="100" title="초기화">↺</button>
                </label>
                <span id="saturationValue" class="engine-val-purple">100</span>
            </div>
            <input type="range" id="saturationSlider" min="0" max="200" value="100">

            <div class="engine-row-between">
                <label><span data-i18n="label_brightness">밝기</span>
                    <button class="mini-btn reset-slider-btn" data-target="brightnessSlider" data-value-id="brightnessValue" data-default="0" title="초기화">↺</button>
                </label>
                <span id="brightnessValue" class="engine-val-purple">0</span>
            </div>
            <input type="range" id="brightnessSlider" min="-100" max="100" value="0">

            <div class="engine-row-between">
                <label><span data-i18n="label_contrast">대비</span>
                    <button class="mini-btn reset-slider-btn" data-target="contrastSlider" data-value-id="contrastValue" data-default="0" title="초기화">↺</button>
                </label>
                <span id="contrastValue" class="engine-val-purple">0</span>
            </div>
            <input type="range" id="contrastSlider" min="-100" max="100" value="0">
        </div>
    </details>

    <details class="category-details">
        <summary><span data-i18n="category_dither">🏁 디더링 및 텍스처 패턴</span></summary>
        <div class="details-content">
            
            <div class="control-group">
                <label class="engine-checkbox-row">
                    <input type="checkbox" id="useMicroDither"> 
                    <span class="engine-checkbox-text">
                        <b data-i18n="label_micro_dither">미세 디더링 (노이즈)</b>
                    </span>
                </label>
                <div id="microDitherControls" class="engine-post-controls" style="display: none;">
                    <label class="engine-label-sm" data-i18n="label_dither_type">방식 선택</label>
                    <select id="basicDitherType" class="ui-select" style="margin-bottom: 8px;">
                        <option value="bayer" data-i18n="dither_bayer">Bayer (규칙적 점묘화)</option>
                        <option value="floyd" data-i18n="dither_floyd">Floyd-Steinberg (부드러운 확산)</option>
                        <option value="sierra" data-i18n="dither_sierra">Sierra-2 (섬세한 확산)</option>
                        <option value="atkinson" data-i18n="dither_atkinson">Atkinson (명암 대비 강화)</option>
                    </select>

                    <label class="engine-label-sm"><span data-i18n="label_dither_strength">디더링 강도:</span> <span id="ditheringValue">50</span></label>
                    <input type="range" id="ditheringSlider" min="0" max="100" value="50" class="engine-slider-full">
                </div>
            </div>

            <hr class="engine-divider-dashed">

            <div class="control-group">
                <label class="engine-checkbox-row">
                    <input type="checkbox" id="useMacroPattern"> 
                    <span class="engine-checkbox-text">
                        <b data-i18n="label_macro_pattern">텍스처 패턴 (질감)</b>
                    </span>
                </label>
                <div id="macroPatternControls" class="engine-post-controls" style="display: none;">
                    <label class="engine-label-sm" data-i18n="label_pattern_type">패턴 선택</label>
                    
                    <div style="display: flex; gap: 5px; margin-bottom: 8px;">
                        <select id="patternTypeSelect" class="ui-select" style="flex: 1;">
                            <option value="grid" selected data-i18n="pat_grid">격자 (Grid)</option>
                            <option value="vertical" data-i18n="pat_vertical">수직선 (Vertical)</option>
                            <option value="checkerboard" data-i18n="pat_checker">체커보드 (Checkerboard)</option>
                            <option value="diagonal_r" data-i18n="pat_diag_r">우하단 대각선 (↘)</option>
                            <option value="diagonal_l" data-i18n="pat_diag_l">좌하단 대각선 (↙)</option>
                            <option value="brick" data-i18n="pat_brick">벽돌 (Brick)</option>
                            <option value="crt" class="engine-val-highlight" data-i18n="pat_crt">CRT 서브픽셀 (화면 배열)</option>
                            <option value="maze" class="engine-val-highlight" data-i18n="pat_maze">미로형 (Labyrinth)</option>
                            <option value="custom" class="engine-val-purple" style="font-weight: bold;" data-i18n="pat_custom">✨ 커스텀 패턴 (직접 제작)</option>
                        </select>
                        <button id="btnOpenPatternEditor" class="mini-btn" style="display: none;" title="패턴 에디터 열기">✏️</button>
                    </div>

                    <label class="engine-label-sm"><span data-i18n="label_pattern_size">패턴 크기/비율:</span> <span id="patternSizeValue">4</span></label>
                    <input type="range" id="patternSizeSlider" min="1" max="10" value="4" class="engine-slider-full" style="margin-bottom: 8px;">

                    <label class="engine-label-sm"><span data-i18n="label_pattern_strength">패턴 강도:</span> <span id="patternStrengthValue">50</span></label>
                    <input type="range" id="patternStrengthSlider" min="0" max="100" value="10" class="engine-slider-full">
                </div>
            </div>

        </div>
    </details>

    <details class="category-details">
        <summary><span data-i18n="category_post">✨ 후처리 효과</span></summary>
        <div class="details-content">
            
            <div class="control-group">
                <label class="engine-checkbox-row">
                    <input type="checkbox" id="usePixelioe"> 
                    <span class="engine-checkbox-text">
                        <b data-i18n="label_pixelioe">Pixelioe</b> 
                        <span class="engine-desc-inline" data-i18n="desc_pixelioe">(픽셀/외곽선 최적화)</span>
                    </span>
                </label>
                <div id="pixelioeControls" class="engine-post-controls" style="display: none;">
                    <label class="engine-label-sm"><span data-i18n="label_strength">강도:</span> <span id="pixelioeStrengthVal">50</span></label>
                    <input type="range" id="pixelioeStrength" min="0" max="100" value="50" class="engine-slider-full">
                </div>
            </div>

            <hr class="engine-divider-dashed">

            <div class="control-group">
                <label class="engine-checkbox-row">
                    <input type="checkbox" id="useSmoothing"> 
                    <span class="engine-checkbox-text">
                        <b data-i18n="label_smoothing">면 평탄화</b> 
                        <span class="engine-desc-inline" data-i18n="desc_smoothing">(Smoothing)</span>
                    </span>
                </label>
                <div id="smoothingControls" class="engine-post-controls" style="display: none;">
                    <label class="engine-label-sm"><span data-i18n="label_strength">강도:</span> <span id="smoothingLevelVal">1</span></label>
                    <input type="range" id="smoothingLevel" min="1" max="10" value="1" class="engine-slider-full">
                    <small class="engine-desc-sm" data-i18n="desc_smoothing_detail">노이즈 픽셀을 주변 색으로 뭉개어 애니메이션 톤으로 만듭니다.</small>
                </div>
            </div>

            <hr class="engine-divider-dashed">

            <div class="control-group">
                <label class="engine-checkbox-row">
                    <input type="checkbox" id="useAlphaGradient"> 
                    <span class="engine-checkbox-text">
                        <b data-i18n="label_alpha_grad">투명도 그라데이션</b>
                    </span>
                </label>
                <div id="alphaGradientControls" class="engine-post-controls" style="display: none; flex-direction: column; gap: 10px;">
                    <div>
                        <label class="engine-label-sm" data-i18n="label_dither_type_alpha">디더링 타입</label>
                        <select id="alphaGradientType" class="ui-select" style="margin-bottom: 5px;">
                            <option value="bayer" data-i18n="alpha_bayer">Bayer (패턴형)</option>
                            <option value="floyd" data-i18n="alpha_floyd">Floyd-Steinberg (유기적)</option>
                            <option value="sierra" data-i18n="alpha_sierra">Sierra (부드러움)</option>
                            <option value="atkinson" data-i18n="alpha_atkinson">Atkinson (명암 대비)</option>
                        </select>
                    </div>
                    <div>
                        <label class="engine-label-sm"><span data-i18n="label_alpha_angle">방향 (각도):</span> <span id="alphaGradientAngleVal">0</span>°</label>
                        <input type="range" id="alphaGradientAngle" min="0" max="360" value="0" class="engine-slider-full">
                    </div>
                    <div>
                        <label class="engine-label-sm"><span data-i18n="label_alpha_size">입자 크기:</span> <span id="alphaGradientSizeVal">1</span></label>
                        <input type="range" id="alphaGradientSize" min="1" max="10" value="1" class="engine-slider-full">
                    </div>
                    <div>
                        <label class="engine-label-sm"><span data-i18n="label_strength">강도:</span> <span id="alphaGradientStrengthVal">50</span></label>
                        <input type="range" id="alphaGradientStrength" min="0" max="100" value="50" class="engine-slider-full">
                    </div>
                </div>
            </div>

            <hr class="engine-divider-dashed">

            <div class="control-group">
                <label class="engine-checkbox-row">
                    <input type="checkbox" id="useOrganicNoise"> 
                    <span class="engine-checkbox-text">
                        <b data-i18n="label_organic_noise">유기적 노이즈</b> 
                        <span class="engine-desc-inline" data-i18n="desc_organic_noise">(Pixel Smear)</span>
                    </span>
                </label>
                <div id="organicNoiseControls" class="engine-post-controls" style="display: none;">
                    <label class="engine-label-sm"><span data-i18n="label_organic_strength">노이즈 확산 강도:</span> <span id="organicNoiseStrengthVal">50</span></label>
                    <input type="range" id="organicNoiseStrength" min="0" max="100" value="50" class="engine-slider-full">
                    <small class="engine-desc-sm" data-i18n="desc_organic_noise_detail">인접한 픽셀의 색상을 무작위로 파먹으며 거칠고 유기적인 텍스처를 생성합니다.</small>
                </div>
            </div>
        </div>
    </details>

</section>

<div id="customPatternModal" class="pattern-modal-overlay" style="display: none;">
    <div class="pattern-modal-content">
        <div class="pattern-modal-header">
            <h3 data-i18n="title_custom_pattern_editor">🎨 커스텀 텍스처 에디터</h3>
            <button id="btnClosePatternEditor" class="mini-btn" title="닫기">✕</button>
        </div>
        
        <div class="pattern-modal-body">
            
            <div class="pattern-editor-controls">
                <label class="engine-label-sm" data-i18n="label_grid_size">그리드 캔버스 크기</label>
                <select id="customPatternSize" class="ui-select" style="margin-bottom: 15px;">
                    <option value="3">3 x 3</option>
                    <option value="4">4 x 4</option>
                    <option value="5" selected>5 x 5 (기본)</option>
                    <option value="7">7 x 7</option>
                    <option value="11">11 x 11 (거대 텍스처)</option>
                </select>
                
                <label class="engine-label-sm" data-i18n="label_brush_state">브러시 선택</label>
                <div class="pattern-tools">
                    <button class="pattern-tool-btn active" data-state="0" title="어둡게 깎아내기">⬛ 깎기 (-)</button>
                    <button class="pattern-tool-btn" data-state="1" title="변화 없음">⬜ 유지</button>
                    <button class="pattern-tool-btn" data-state="2" title="밝게 덧칠하기">🟩 덧칠 (+)</button>
                </div>
            </div>
            
            <div class="pattern-editor-workspace">
                <div id="customPatternGrid" class="custom-pattern-grid"></div>
            </div>
            
            <div class="pattern-modal-footer">
                <button id="btnSaveCustomPattern" class="mini-btn" data-i18n="btn_save_pattern">💾 패턴 저장</button>
                <button id="btnLoadCustomPattern" class="mini-btn" data-i18n="btn_load_pattern">📂 불러오기</button>
                <input type="file" id="patternUpload" style="display: none;" accept=".json">
                
                <button id="btnApplyCustomPattern" class="primary-btn" data-i18n="btn_apply_pattern">🚀 텍스처 반영하기</button>
            </div>
        </div>
    </div>
</div>
